name: Publish Obsidian Notes

on:
  push:
    branches:
      - vault

permissions:
  contents: write

jobs:
  publish:

    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: vault

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Convert Markdown
        run: |
          python obsidian-to-github-md.py

      ########################################################

      - name: Create Deploy Repository
        run: |

          mkdir deploy

          cp -R .temp_publish/Published deploy/Published

      ########################################################

      - name: Initialize Git
        working-directory: deploy
        run: |

          git init

          git checkout --orphan main

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "Auto publish"

      ########################################################

      - name: Push Deploy Branch
        working-directory: deploy
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          git remote add origin \
            https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

          git push --force origin main