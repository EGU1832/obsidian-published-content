name: Test Markdown Converter

on:
  push:
    branches:
      - main

jobs:
  test-converter:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Repository Structure
        run: |
          echo "Repository Root"
          pwd
          ls -la
          echo ""
          echo "Published"
          ls -R Published

      - name: Run Converter
        run: |
          python obsidian-to-github-md.py

      - name: Verify Output
        run: |
          echo ""
          echo "===== .temp_publish ====="
          ls -R .temp_publish