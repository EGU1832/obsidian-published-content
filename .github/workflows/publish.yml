name: Publish Obsidian Notes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    # github-actions가 만든 commit으로는 다시 실행하지 않음
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Convert Markdown
        run: |
          python obsidian-to-github-md.py

      - name: Replace Published Folder
        run: |
          rsync -a --delete .temp_publish/Published/ Published/
          rm -rf .temp_publish

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit Changes
        run: |
          git add Published

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto publish"

      - name: Push Changes
        run: |
          git push